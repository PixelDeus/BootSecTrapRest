<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white fw-bold" id="navbarUserInfo"></span>
    <form th:action="@{/logout}" method="post" class="ms-auto">
        <button type="submit" class="btn btn-link text-white text-decoration-none">Logout</button>
    </form>
</nav>

<div class="d-flex" style="min-height: calc(100vh - 56px);">

    <div class="bg-white border-end" style="width: 220px; min-width: 220px;">
        <div class="list-group list-group-flush">
            <a href="/admin" class="list-group-item list-group-item-action active bg-primary text-white border-0 py-3">Admin</a>
            <a href="/user" class="list-group-item list-group-item-action text-primary border-0 py-3">User</a>
        </div>
    </div>

    <div class="flex-grow-1 p-4">
        <h3 class="mb-3">Admin panel</h3>

        <ul class="nav nav-tabs mb-3" id="adminTabs">
            <li class="nav-item">
                <a class="nav-link active text-dark" id="tab-table" href="#" onclick="showTab('table'); return false;">Users table</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-primary" id="tab-new" href="#" onclick="showTab('new'); return false;">New User</a>
            </li>
        </ul>

        <div id="pane-table">
            <div class="border rounded p-3">
                <h6 class="mb-3">All users</h6>
                <table class="table table-bordered">
                    <thead>
                    <tr>
                        <th>ID</th><th>First Name</th><th>Last Name</th>
                        <th>Email</th><th>Role</th><th>Edit</th><th>Delete</th>
                    </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="pane-new" style="display:none;">
            <div class="border rounded p-4" style="max-width: 500px;">
                <form id="addUserForm">
                    <div class="mb-2"><label class="form-label">First Name</label>
                        <input type="text" name="firstName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Last Name</label>
                        <input type="text" name="lastName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Role</label>
                        <select name="roles" id="addRoles" class="form-select" multiple size="2"></select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editUserForm">
                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">
                    <div class="mb-2"><label class="form-label">First Name</label>
                        <input type="text" name="firstName" id="editFirstName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Last Name</label>
                        <input type="text" name="lastName" id="editLastName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Email</label>
                        <input type="email" name="email" id="editEmail" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Username</label>
                        <input type="text" name="username" id="editUsername" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Password</label>
                        <input type="password" name="password" id="editPassword" class="form-control"></div>
                    <div class="mb-2"><label class="form-label">Role</label>
                        <select name="roles" id="editRoles" class="form-select" multiple size="2"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Delete user with ID: <strong id="deleteUserId"></strong>?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function getCsrf() {
        const match = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
        return match ? decodeURIComponent(match[1]) : '';
    }

    function apiFetch(url, options = {}) {
        return fetch(url, {
            headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': getCsrf(), ...options.headers },
            ...options
        });
    }

    function rolesText(roles) {
        return roles.map(r => r.name).join(', ');
    }

    function loadUsers() {
        apiFetch('/api/admin/users')
            .then(r => r.json())
            .then(users => {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>${u.id}</td><td>${u.firstName}</td><td>${u.lastName}</td>
                        <td>${u.email}</td><td>${rolesText(u.roles)}</td>
                        <td><button class="btn btn-sm btn-info text-white" onclick="openEditModal(${u.id})">Edit</button></td>
                        <td><button class="btn btn-sm btn-danger" onclick="openDeleteModal(${u.id})">Delete</button></td>
                    </tr>`).join('');
            });
    }

    function loadRolesInto(selectId, selectedIds = []) {
        apiFetch('/api/admin/roles')
            .then(r => r.json())
            .then(roles => {
                const sel = document.getElementById(selectId);
                sel.innerHTML = roles.map(r =>
                    `<option value="${r.id}" ${selectedIds.includes(r.id) ? 'selected' : ''}>${r.name}</option>`
                ).join('');
            });
    }

    function loadCurrentUser() {
        apiFetch('/api/user')
            .then(r => r.json())
            .then(u => {
                document.getElementById('navbarUserInfo').textContent =
                    u.email + ' with roles: ' + rolesText(u.roles);
            });
    }

    function getSelectedRoles(selectId) {
        const sel = document.getElementById(selectId);
        return Array.from(sel.selectedOptions).map(o => ({ id: parseInt(o.value) }));
    }

    function showTab(tab) {
        document.getElementById('pane-table').style.display = tab === 'table' ? '' : 'none';
        document.getElementById('pane-new').style.display = tab === 'new' ? '' : 'none';
        document.getElementById('tab-table').classList.toggle('active', tab === 'table');
        document.getElementById('tab-new').classList.toggle('active', tab === 'new');
    }

    function openEditModal(id) {
        apiFetch('/api/admin/users/' + id)
            .then(r => r.json())
            .then(u => {
                document.getElementById('editId').value = u.id;
                document.getElementById('editFirstName').value = u.firstName;
                document.getElementById('editLastName').value = u.lastName;
                document.getElementById('editEmail').value = u.email;
                document.getElementById('editUsername').value = u.username;
                document.getElementById('editPassword').value = '';
                loadRolesInto('editRoles', u.roles.map(r => r.id));
                new bootstrap.Modal(document.getElementById('editModal')).show();
            });
    }

    function openDeleteModal(id) {
        document.getElementById('deleteUserId').textContent = id;
        document.getElementById('confirmDeleteBtn').onclick = () => deleteUser(id);
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function deleteUser(id) {
        apiFetch('/api/admin/users/' + id, { method: 'DELETE' })
            .then(() => {
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                loadUsers();
            });
    }

    document.getElementById('addUserForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const fd = new FormData(this);
        const user = {
            firstName: fd.get('firstName'), lastName: fd.get('lastName'),
            email: fd.get('email'),
            username: fd.get('username'), password: fd.get('password'),
            roles: getSelectedRoles('addRoles')
        };
        apiFetch('/api/admin/users', { method: 'POST', body: JSON.stringify(user) })
            .then(() => { this.reset(); loadUsers(); showTab('table'); });
    });

    document.getElementById('editUserForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const fd = new FormData(this);
        const user = {
            id: parseInt(fd.get('id')),
            firstName: fd.get('firstName'), lastName: fd.get('lastName'),
            email: fd.get('email'),
            username: fd.get('username'), password: fd.get('password'),
            roles: getSelectedRoles('editRoles')
        };
        apiFetch('/api/admin/users', { method: 'PUT', body: JSON.stringify(user) })
            .then(() => {
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                loadUsers();
            });
    });

    loadCurrentUser();
    loadUsers();
    loadRolesInto('addRoles');
</script>
</body>
</html>
